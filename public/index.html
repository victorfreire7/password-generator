<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <section class="container">
        <h1>Gerador de senhas</h1>

        <div class="senhaGerada">Sua senha aparecerá aqui.</div>
        
        <p>Quantidade de caracteres <input value="20" type="number" class="qtdCharact"></p>
        <p>Adicionar maiúsculas <input type="checkbox" class="chkUpper" checked></p>
        <p>Adicionar minúsculas <input type="checkbox" class="chkLower" checked></p>
        <p>Adicionar números <input type="checkbox" class="chkNumber" ></p>
        <p>Adicionar simbolos <input type="checkbox" class="chkSimbols"></p>

        <button class="gerarSenha">Gerar Senha</button>
    </section>

    <script src="./assets/js/bundle.js"></script>
</body>
</html>
